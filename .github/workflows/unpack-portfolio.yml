name: Unpack portfolio source

on:
  push:
    paths:
      - "portfolio-source.zip.part*"

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Reassemble and unpack source
        shell: bash
        run: |
          cat portfolio-source.zip.part* > portfolio-source.zip
          unzip -o portfolio-source.zip
          rm -f portfolio-source.zip portfolio-source.zip.part*
      - name: Commit portfolio source
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Add portfolio source"
          git push
